<text x="40" y="568" class="tileLabel">Key Points:</text>
<text x="40" y="588" class="tileNote">- Value tiles (white cells) and index tiles (yellow cells) must have matching valid regions</text>
<text x="40" y="606" class="tileNote">- dstVal and dstIdx valid region must match src0Val or src1Val valid region</text>
<text x="40" y="624" class="tileNote">- When both inputs valid: select min value and its corresponding index</text>
<text x="40" y="642" class="tileNote">- When only one input valid: copy that input's value and index</text>

<text x="40" y="720" class="caption">Example: src0Val valid region matches dstVal; src1Val has smaller valid region within dstVal bounds.</text>
